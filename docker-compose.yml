services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reflow
      POSTGRES_PASSWORD: reflow
      POSTGRES_DB: reflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reflow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
